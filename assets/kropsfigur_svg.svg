<?xml version="1.0" encoding="UTF-8"?>
<!--
  kropsfigur_svg.svg
  Klikbare behandlingszoner oven på et billede af en kropsfigur.

  Sådan virker det:
  - <image> viser selve kropsfiguren (eksternt PNG-billede)
  - <a>-tags omslutter hver zone og linker til behandlingssiden
  - .zone-klassen styrer udseendet: gennemsigtig som standard,
    orange glød ved hover/tap (CSS nedenfor)
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1375 1536">

  <style>
    .zone {
      fill: transparent;
      cursor: pointer;
      outline: none;
      transition: fill 0.25s ease, filter 0.25s ease;
    }

    .zone:hover,
    .zone:focus,
    .zone:active {
      fill: rgba(242, 146, 29, 0.35);
      filter: drop-shadow(0 0 14px rgba(242, 146, 29, 0.85));
    }

    @media (prefers-reduced-motion: reduce) {
      .zone { transition: none; }
    }

    .zone-label {
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 44px;
      font-weight: 600;
      fill: #194470;
      pointer-events: none;
    }

    .zone-linje {
      stroke: #194470;
      stroke-width: 3;
      fill: none;
      pointer-events: none;
    }
  </style>

  <!-- Baggrundsbillede af kropsfiguren -->
  <image href="kropsfigur_base.png" width="1375" height="1536" />

  <!-- Klikbare zoner – hver <a> linker til en behandlingssektion -->

  <a href="behandlinger.html#hoved" aria-label="Behandling af hoved" target="_top">
    <ellipse id="hoved" class="zone" cx="679" cy="145" rx="100" ry="70"/>
  </a>

  <a href="behandlinger.html#kaebe" aria-label="Behandling af kæbe" target="_top">
    <ellipse id="kaebe" class="zone" cx="685" cy="258" rx="85" ry="36"/>
  </a>

  <a href="behandlinger.html#nakkeogskuldre" aria-label="Behandling af nakke og skuldre" target="_top">
    <ellipse class="zone" cx="575" cy="372" rx="96" ry="76"/>
    <ellipse class="zone" cx="664" cy="318" rx="52" ry="42"/>
    <ellipse class="zone" cx="756" cy="384" rx="96" ry="76"/>
  </a>

  <a href="behandlinger.html#ryg" aria-label="Behandling af ryg" target="_top">
    <ellipse id="ryg" class="zone" cx="681" cy="574" rx="113" ry="90"/>
  </a>

  <a href="behandlinger.html#hofte" aria-label="Behandling af hofte" target="_top">
    <ellipse id="hofte" class="zone" cx="685" cy="762" rx="155" ry="75"/>
  </a>

  <a href="behandlinger.html#knae" aria-label="Behandling af knæ" target="_top">
    <ellipse class="zone" cx="597" cy="1076" rx="72" ry="62"/>
    <ellipse class="zone" cx="759" cy="1085" rx="72" ry="85"/>
  </a>

  <a href="behandlinger.html#fod" aria-label="Behandling af fødder" target="_top">
    <ellipse class="zone" cx="630" cy="1370" rx="64" ry="104"/>
    <ellipse class="zone" cx="762" cy="1365" rx="64" ry="120"/>
  </a>

  <!-- Zone-etiketter – placeret 25px fra cirkel-kanten -->

  <!-- Hoved → højre side (cx=679 rx=100 → kant=779 +25) -->
  <text class="zone-label" x="804" y="160">Hoved</text>

  <!-- Kæbe → højre side (cx=685 rx=85 → kant=770 +25) -->
  <text class="zone-label" x="795" y="273">Kæbe</text>

  <!-- Nakke &amp; Skuldre → venstre side (cx=575 rx=96 → kant=479 -25) -->
  <text class="zone-label" x="454" y="358" text-anchor="end">Nakke &amp;</text>
  <text class="zone-label" x="454" y="406" text-anchor="end">Skuldre</text>

  <!-- Ryg → venstre side (cx=681 rx=113 → kant=568 -25) -->
  <text class="zone-label" x="543" y="589" text-anchor="end">Ryg</text>

  <!-- Hofte → højre side (cx=685 rx=155 → kant=840 +25) -->
  <text class="zone-label" x="865" y="777">Hofte</text>

  <!-- Knæ → højre side (cx=759 rx=72 → kant=831 +25) -->
  <text class="zone-label" x="856" y="1097">Knæ</text>

  <!-- Fødder → højre side (cx=762 rx=64 → kant=826 +25) -->
  <text class="zone-label" x="851" y="1383">Fødder</text>

</svg>